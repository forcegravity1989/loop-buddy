// 示例:create-loop 的产物 —— 一条「修复上报问题」的 Loop 规格
// 这是已有的两条成形 Loop 之一,用来示范输出格式。
// 把这份对象作为 Workflow 工具的 `args`,喂给 ../templates/loop.workflow.js 即可运行。

{
  // ── Query:大白话目标翻成的清晰 prompt ──
  query: "受理一条用户上报的问题,定位根因并写最小修复,直到验收测试转绿、且不碰敏感面。",

  // ── Goal:一句话 ──
  goal: "把这个上报的问题真正修好,且改动可信、影响面可控。",

  // ── Goal 的验收标准(= 验收闸判据,需人认证「充分+客观+抗漂移」)──
  acceptance: `
    1. 复现阶段写的那条"会失败的测试",修复后必须转绿(可自检、客观)。
    2. 改动经独立评审 agent 通过(质量 + 影响面)。
    3. 不得为了让测试变绿而删/弱化测试或写死返回值。
    4. 若改动触及 登录 / 支付 / 对外接口 → 不自动合并,标记转副作用闸。
  `,

  // ── 固定 Workflow 模板的阶段 + Agent Team(复用已接入的 agents)──
  stages: [
    { name: "受理", model: "haiku",  prompt: "判断这是真问题 / 重复 / 噪音;只有真问题才继续,并一句话说清要修什么。" },
    { name: "复现", model: "sonnet", prompt: "复现该问题,并写一条当前会失败的测试,作为本 Loop 的验收锚点。" },
    { name: "修复", model: "opus",   prompt: "写最小修复,让上一步那条测试转绿,且不破坏其它测试;说明改了什么、为什么。" },
    { name: "评审", model: "opus",   prompt: "独立评审改动的质量与影响面;若触及登录/支付/对外接口,明确标记『需副作用闸人批』。" },
  ],

  team: ["受理", "复现", "修复", "评审"],   // 来自已接入家底的 agents

  // ── 类型 ──
  kind: "executor",        // 执行器:跑到 Goal 验收自停
  maxIters: 3,             // 验收未过最多带缺口迭代 3 轮,仍不过则浮出给人

  // ── 运行时副作用(由副作用闸在脚本外围把关)──
  sideEffects: ["合并到主干"],

  // ── 两道闸 ──
  gates: {
    verification: "上线前由人认证此 acceptance「充分+客观+抗漂移」;命中『fix 类 · 失败测试转绿 + 独立评审』已认证模式 → 飞轮自动放行。",
    sideEffect:   "合并 / 触及敏感面 → 人批 + kill switch + 动作日志;不可逆动作即便命中飞轮仍二次确认。",
  },
}
