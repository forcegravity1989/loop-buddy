<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Builders' Workbench · OPC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1EFE7; --paper-2:#F6F4EC; --surface:#FCFBF7; --surface-2:#FFFFFF;
    --ink:#1A1A17; --ink-2:#6C6A61; --ink-3:#9C9A8E;
    --line:#E4E0D4; --line-2:#D8D3C4;
    --clay:#CC785C; --clay-deep:#A9512F; --clay-soft:#EFDCD1;
    --ok:#477A53; --ok-soft:#E2ECE2; --warn:#B0792B; --warn-soft:#F2E8CF; --risk:#AF4736; --risk-soft:#F2DCD5;
    --blue:#3E6B8C; --blue-soft:#E2EBF0; --slate:#7B8794; --slate-soft:#E9ECEF;
    --r:13px; --r-sm:9px; --r-xs:6px;
    --serif:"Tiempos Headline","Iowan Old Style",Georgia,"Songti SC",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Inter,sans-serif;
    --mono:"JetBrains Mono","SF Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;height:100vh;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .shell{display:flex;flex-direction:column;height:100vh}

  /* ===== top bar ===== */
  .bar{height:58px;flex:none;display:flex;align-items:center;gap:16px;padding:0 20px;border-bottom:1px solid var(--line);background:var(--surface)}
  .wordmark{font-family:var(--serif);font-size:18px;letter-spacing:-.01em;display:flex;align-items:center;gap:9px;white-space:nowrap}
  .wordmark .d{width:9px;height:9px;border-radius:50%;background:var(--clay)}
  .wordmark b{font-weight:600}
  .wordmark .opc{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.12em;margin-left:2px}
  .routebadge{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:9px;background:var(--paper-2);overflow:hidden;cursor:pointer}
  .routebadge .lab{font-size:11px;color:var(--ink-3);padding:0 10px;white-space:nowrap}
  .routebadge .seg{display:flex;align-items:center;gap:5px;padding:6px 11px;border-left:1px solid var(--line);font-size:12px;color:var(--ink-2)}
  .routebadge .seg .n{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;font-size:13px}
  .routebadge .seg.cert .n{color:var(--clay-deep)} .routebadge .seg.appr .n{color:var(--warn)} .routebadge .seg.err .n{color:var(--risk)}
  .routebadge:hover{border-color:var(--clay)}
  .grow{flex:1}
  .seg-nav{display:flex;background:var(--paper-2);border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg-nav button{border:none;background:none;font-size:13px;color:var(--ink-2);padding:6px 13px;border-radius:7px;cursor:pointer;font-weight:500}
  .seg-nav button.on{background:var(--surface-2);color:var(--ink);box-shadow:0 1px 2px rgba(60,50,30,.07)}
  .newbtn{display:flex;align-items:center;gap:7px;border:1px solid var(--clay);color:var(--clay-deep);background:var(--surface-2);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer}
  .newbtn:hover{background:var(--clay-soft)}
  .newbtn .pl{font-size:15px;line-height:1}
  .kbd{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-3);border:1px solid var(--line);border-radius:7px;padding:5px 9px;background:var(--paper-2);cursor:pointer}
  .kbd b{font-family:var(--mono);font-size:11px;color:var(--ink-2)}
  .ex{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-2);cursor:pointer;user-select:none;border:1px solid var(--line);border-radius:20px;padding:5px 11px}
  .ex.on{border-color:var(--clay);color:var(--clay-deep);background:var(--clay-soft)}
  .ex .sw{width:28px;height:16px;border-radius:9px;background:var(--line-2);position:relative;transition:.15s}
  .ex.on .sw{background:var(--clay)}
  .ex .sw i{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:.15s}
  .ex.on .sw i{left:14px}
  .live{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-3);white-space:nowrap}
  .live .p{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2.2s infinite}
  .live .num{font-size:11.5px}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  .ava{width:30px;height:30px;border-radius:8px;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:var(--serif);font-size:14px}

  /* ===== three-pane ===== */
  .app{flex:1;display:grid;grid-template-columns:248px 1fr 332px;min-height:0;position:relative}
  .rail,.main,.aside{overflow:auto;min-height:0}
  .rail{border-right:1px solid var(--line);background:var(--paper-2);padding:14px 11px}
  .aside{border-left:1px solid var(--line);background:var(--surface);padding:0}
  .main{padding:22px 28px 60px}

  /* ===== rail · product spine ===== */
  .rail .rh{display:flex;align-items:baseline;justify-content:space-between;padding:4px 8px 10px;color:var(--ink-3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
  .xrow{display:flex;gap:9px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 11px;cursor:pointer;margin-bottom:12px}
  .xrow:hover{border-color:var(--clay)}
  .xrow .xi{width:26px;height:26px;border-radius:7px;background:var(--clay-soft);color:var(--clay-deep);display:grid;place-items:center;font-size:13px;flex:none}
  .xrow .xt{font-size:12.5px;font-weight:600;line-height:1.3}
  .xrow .xs{font-size:11px;color:var(--ink-3)}
  .prow{display:flex;gap:10px;align-items:flex-start;padding:9px 9px;border-radius:10px;cursor:pointer;margin-bottom:2px}
  .prow:hover{background:var(--surface)}
  .prow.sel{background:var(--clay-soft)}
  .prow.sel .pn{color:var(--clay-deep)}
  .prow .dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:none}
  .prow .pn{font-weight:600;font-size:13.5px;line-height:1.3}
  .prow .pm{font-size:11px;color:var(--ink-3);margin-top:2px}
  .prow .pm .num{font-size:11px}
  .dot.green{background:var(--ok)} .dot.amber{background:var(--warn)} .dot.red{background:var(--risk)}
  .railadd{margin-top:10px;padding:9px;text-align:center;color:var(--ink-3);font-size:12.5px;border:1px dashed var(--line-2);border-radius:9px;cursor:pointer}
  .railadd:hover{color:var(--clay-deep);border-color:var(--clay)}

  /* ===== main · inbox ===== */
  .mhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .mhead h1{font-family:var(--serif);font-size:23px;font-weight:500;letter-spacing:-.01em;margin:0}
  .mhead .hb{font-size:12px;font-weight:600;padding:2px 9px;border-radius:20px}
  .b-green{background:var(--ok-soft);color:var(--ok)} .b-amber{background:var(--warn-soft);color:var(--warn)} .b-red{background:var(--risk-soft);color:var(--risk)} .b-soft{background:var(--paper-2);color:var(--ink-2);border:1px solid var(--line)} .b-clay{background:var(--clay-soft);color:var(--clay-deep)} .b-blue{background:var(--blue-soft);color:var(--blue)}
  .msub{color:var(--ink-2);font-size:13px;margin:2px 0 20px}
  .msub b{color:var(--ink);font-weight:600}
  .msub .lnk{color:var(--clay-deep);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

  .inbox{display:flex;flex-direction:column;gap:10px}
  .icard{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line-2);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:.12s}
  .icard:hover{border-color:var(--clay);transform:translateY(-1px)}
  .icard.sel{border-color:var(--clay);box-shadow:0 0 0 2px var(--clay-soft)}
  .icard.t-cert{border-left-color:var(--clay)} .icard.t-side{border-left-color:var(--warn)} .icard.t-fail{border-left-color:var(--risk)} .icard.t-stuck{border-left-color:var(--slate)} .icard.t-sys{border-left-color:var(--ink-3);border-style:dashed;background:var(--paper-2)}
  .icard .ir1{display:flex;align-items:center;gap:9px}
  .icard .itag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .icard .it{font-weight:650;font-size:14.5px;flex:1}
  .icard .iwhy{font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.5}
  .icard .imeta{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:9px;display:flex;gap:13px}
  .icard .drawer{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .icard.sel .drawer{max-height:260px;margin-top:12px}
  .drawer .dwrap{border-top:1px solid var(--line);padding-top:12px}
  .clusterbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 11px;margin-top:9px}
  .clusterbar .cl-main{color:var(--risk);font-weight:600}
  .gotorun{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--clay-deep);font-weight:600;cursor:pointer;margin-top:10px}
  .gotorun:hover{text-decoration:underline;text-underline-offset:2px}

  .empty{text-align:center;padding:70px 20px;color:var(--ok)}
  .empty .ei{width:46px;height:46px;border-radius:50%;background:var(--ok-soft);color:var(--ok);display:grid;place-items:center;margin:0 auto 16px;font-size:22px}
  .empty .et{font-family:var(--serif);font-size:20px;color:var(--ink);margin-bottom:6px}
  .empty .es{font-size:13.5px;color:var(--ink-2)}
  .autoclosed{margin-top:18px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);overflow:hidden}
  .autoclosed .ach{display:flex;align-items:center;gap:8px;padding:12px 15px;cursor:pointer;font-size:13px;color:var(--ink-2)}
  .autoclosed .ach b{color:var(--ink);font-weight:600}
  .autoclosed .acbody{display:none;border-top:1px solid var(--line);padding:6px 15px 12px}
  .autoclosed.open .acbody{display:block}
  .acline{font-size:12.5px;color:var(--ink-3);padding:7px 0;border-bottom:1px solid var(--line);display:flex;gap:10px}
  .acline:last-child{border:none} .acline .ok{color:var(--ok)}

  /* ===== creation · chat ===== */
  .chat{display:flex;flex-direction:column;height:100%}
  .crumb{font-size:12.5px;color:var(--ink-3);margin-bottom:16px}
  .crumb b{color:var(--clay-deep);font-weight:600}
  .bubbles{display:flex;flex-direction:column;gap:14px;flex:1}
  .bub{max-width:88%;font-size:14px;line-height:1.6}
  .bub.u{align-self:flex-end;background:var(--clay);color:#fff;padding:11px 15px;border-radius:14px 14px 4px 14px}
  .bub.c{align-self:flex-start;background:var(--surface);border:1px solid var(--line);padding:13px 16px;border-radius:14px 14px 14px 4px}
  .bub.c .who{font-size:11px;color:var(--ink-3);font-weight:600;margin-bottom:5px;letter-spacing:.04em}
  .bub.c b{color:var(--ink);font-weight:650}
  .bub.c .pit{color:var(--risk);font-weight:600}
  .starters{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .starter{border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:13px 15px;cursor:pointer;transition:.12s}
  .starter:hover{border-color:var(--clay);transform:translateY(-1px)}
  .starter .stt{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:8px}
  .starter .sts{font-size:12px;color:var(--ink-3);margin-top:4px}
  .composer{margin-top:16px;border:1px solid var(--line);border-radius:12px;background:var(--surface);padding:12px 14px}
  .composer .ci{font-size:13.5px;color:var(--ink-3)}
  .composer .cap{font-size:11.5px;color:var(--ink-3);margin-top:9px;border-top:1px solid var(--line);padding-top:9px}
  .composer .cap b{color:var(--clay-deep);font-family:var(--mono);font-weight:500}
  .runrow{margin-top:18px;display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px}
  .runrow.low{background:var(--ok-soft);border:1px solid var(--ok)}
  .runrow .rr-t{flex:1;font-size:13px;color:var(--ok)}
  .runrow .rr-t b{font-weight:700}

  /* ===== buttons ===== */
  .btn{font-size:13px;font-weight:600;border-radius:8px;padding:9px 15px;border:1px solid transparent;cursor:pointer;transition:.12s;white-space:nowrap}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--clay);color:#fff} .btn.primary:hover{background:var(--clay-deep)}
  .btn.primary:disabled{background:var(--line-2);color:var(--ink-3);cursor:not-allowed;transform:none}
  .btn.dark{background:var(--ink);color:var(--paper)} .btn.dark:hover{background:#000}
  .btn.ghost{background:transparent;color:var(--ink-2);border-color:var(--line)} .btn.ghost:hover{color:var(--ink);border-color:var(--line-2)}
  .btn.ok{background:var(--ok);color:#fff} .btn.ok:hover{filter:brightness(1.05)}
  .btn.kill{background:var(--risk-soft);color:var(--risk);border-color:var(--risk)} .btn.kill:hover{background:var(--risk);color:#fff}
  .btn.sm{padding:6px 11px;font-size:12px}

  /* ===== aside states ===== */
  .ax{padding:18px 16px}
  .ax-head{font-size:11px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;color:var(--ink-3);padding:13px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:2}
  .ax-head.create{background:var(--clay-soft);color:var(--clay-deep);border-bottom-color:var(--clay)}
  .ax-head.decide{background:var(--paper-2);color:var(--ink-2)}
  .ax .lever{margin-bottom:18px}
  .healthline{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r);background:var(--paper-2);margin-bottom:8px}
  .healthline .hl-d{width:11px;height:11px;border-radius:50%;flex:none}
  .healthline .hl-t{font-family:var(--serif);font-size:17px}
  .healthline .hl-s{font-size:11.5px;color:var(--ink-3)}
  .ax .axlabel{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin:18px 0 9px}
  .leverbox{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);padding:12px 14px;margin-bottom:8px}
  .leverbox .lv1{display:flex;align-items:baseline;justify-content:space-between}
  .leverbox .lv1 .k{font-size:12.5px;color:var(--ink-2);font-weight:600}
  .leverbox .lv1 .v{font-family:var(--mono);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
  .leverbox .v .ar{font-size:11px} .ar.good{color:var(--ok)} .ar.bad{color:var(--risk)}
  .leverbox .lv2{font-size:11.5px;color:var(--ink-3);margin-top:4px}
  .leverbox .lv2 .drv{color:var(--blue);font-weight:600}

  .dctx{font-size:13px}
  .dctx .dterm{font-weight:650;font-size:14px;margin-bottom:4px}
  .dctx .dwhat{background:var(--risk-soft);border:1px solid var(--risk);border-radius:var(--r-sm);padding:11px 13px;color:var(--ink);font-size:12.5px;line-height:1.6;margin-bottom:12px}
  .dctx .dwhat.warn{background:var(--warn-soft);border-color:var(--warn)}
  .dctx .dwhat b{color:var(--clay-deep)}
  .acc{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);padding:11px 13px;margin-bottom:12px}
  .acc .acl{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:6px}
  .acc .acc-c{font-family:var(--mono);font-size:12px;color:var(--ink);line-height:1.7}
  .pitbox{background:var(--warn-soft);border-left:3px solid var(--warn);border-radius:var(--r-xs);padding:10px 12px;font-size:12.5px;color:var(--ink);margin-bottom:12px;line-height:1.55}
  .pitbox b{color:var(--warn)}
  .difftoggle{font-size:12.5px;color:var(--clay-deep);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px;padding:9px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:11px}
  .difbody{display:none;font-family:var(--mono);font-size:11.5px;line-height:1.7;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-xs);padding:11px;margin-bottom:11px;white-space:pre-wrap}
  .difbody.open{display:block}
  .difbody .add{color:var(--ok)} .difbody .del{color:var(--risk)}
  .reason{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--sans);font-size:13px;resize:vertical;min-height:54px;background:var(--surface-2);margin-bottom:11px}
  .reason:focus{outline:none;border-color:var(--clay)}
  .gateacts{display:flex;flex-direction:column;gap:8px}
  .gateacts .row{display:flex;gap:8px}.gateacts .row .btn{flex:1;text-align:center}
  .gatenote{font-size:11.5px;color:var(--ink-3);margin-top:9px;line-height:1.5}
  .killrow{margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}

  /* ===== fleet / detail / board / flywheel ===== */
  .label{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin:22px 0 10px}
  .label:first-child{margin-top:4px}
  .wfgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:12px}
  .wfcard{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line-2);border-radius:var(--r);padding:14px 15px;cursor:pointer;transition:.12s}
  .wfcard:hover{border-color:var(--clay);transform:translateY(-1px)}
  .wfcard.green{border-left-color:var(--ok)} .wfcard.amber{border-left-color:var(--warn)} .wfcard.red{border-left-color:var(--risk)}
  .wfcard .wn{font-weight:650;font-size:14px;display:flex;align-items:center;gap:7px}
  .wfcard .wk{font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;margin-left:auto}
  .wfcard .ws{font-size:12px;color:var(--ink-2);margin-top:8px}
  .wfcard .agg{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);margin-top:7px}
  .wfcard .agg .run{color:var(--ok)} .wfcard .agg .stk{color:var(--warn)} .wfcard .agg .fl{color:var(--risk)}
  .wfcard .chain{display:flex;flex-wrap:wrap;align-items:center;gap:3px 2px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
  .wfcard .openrun{font-size:11.5px;color:var(--clay-deep);font-weight:600;margin-top:9px;display:flex;align-items:center;gap:5px}
  .skillchip{font-family:var(--mono);font-size:10.5px;color:var(--ink-2);background:var(--paper-2);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .skillchip.paid{color:var(--warn);border-color:var(--warn-soft);background:var(--warn-soft)}
  .chain .arr2{color:var(--ink-3);font-size:10px;margin:0 1px}
  @keyframes mfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .main.fadein{animation:mfade .3s cubic-bezier(.16,1,.3,1)}
  @media(prefers-reduced-motion:reduce){.main.fadein{animation:none}}

  .back{display:inline-flex;align-items:center;gap:6px;color:var(--ink-2);font-size:13px;cursor:pointer;border:none;background:none;padding:0;margin-bottom:14px}
  .back:hover{color:var(--clay-deep)}
  .phead{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px}
  .phead h2{font-family:var(--serif);font-weight:500;font-size:25px;letter-spacing:-.01em;margin:0}
  .pmeta{color:var(--ink-2);font-size:13px;margin-bottom:6px}
  .pmeta b{color:var(--ink);font-weight:600}
  .phaserail{display:flex;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface)}
  .phaserail .seg2{flex:1;padding:11px 12px;border-right:1px solid var(--line);position:relative}
  .phaserail .seg2:last-child{border-right:none}
  .phaserail .seg2 .zh{font-weight:650;font-size:13px}
  .phaserail .seg2 .en{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin-top:1px}

  /* svg node visual states reuse tokens */
  .rn-box{fill:var(--surface-2);stroke:var(--line-2);stroke-width:1.5}

  .rn-livedot{fill:var(--clay)}

function fadeMain(){const m=$("main");if(!m)return;m.classList.remove("fadein");void m.offsetWidth;m.classList.add("fadein")}
function openPalette(){$("palette").classList.add("show")}
function closePalette(){$("palette").classList.remove("show")}

/* ============ main router ============ */
function renderMain(){
  if(mode==="create"){renderCreate();return}
  if(mode==="setup"){renderSetup();return}
  if(mode==="project"){renderProject();return}
  if(view==="inbox")return renderInbox();
  if(view==="fleet")return detailWf?renderDetail():renderFleet();
  if(view==="run")return renderRun();
  if(view==="board")return renderBoard();
  if(view==="flywheel")return renderFlywheel();
}

/* ============ RUN · live workflow run view ============ */
function openRun(id,e){if(e)e.stopPropagation();const hit=findWf(id);if(!hit){toast('没找到这条流水线');return}curProd=hit.pid;runWf=id;runNodeSel=null;view="run";mode="normal";sel=null;detailWf=null;stopRun();render();fadeMain();startRunAnim();}
function stopRun(){if(runTimer){clearTimeout(runTimer);runTimer=null}runShown=0}
function startRunAnim(){
  const hit=findWf(runWf);if(!hit||!hit.w.animate)return;
  const ev=RUN_JOURNAL[runWf]||[];
  runShown=0;
  const tick=()=>{
    if(runShown>=ev.length){runTimer=null;return}
    runShown++;
    paintJournal();
    runTimer=setTimeout(tick,runShown<ev.length?1300:0);
  };
  // seed first two instantly, then stream
  runShown=2;paintJournal();
  runTimer=setTimeout(tick,1300);
}
function paintJournal(){
  const feed=$("jfeed");if(!feed)return;
  const ev=(RUN_JOURNAL[runWf]||[]).slice(0,runShown);
  feed.innerHTML=ev.slice().reverse().map(jrowHtml).join("")||`<div style="padding:14px;color:var(--ink-3);font-size:12px">这条全绿 · 暂无活动事件</div>`;
}
function jrowHtml(e){
  const isStart=e.kind==="started"||e.kind==="gatehold";
  const mark=e.kind==="result"?"✓完成":(e.kind==="gatehold"?"⏸停在待批":"◷开始");

  const badges=(e.cache?'<span class="jbadge cache">自动重用·缓存命中</span>':'')+(e.struct?'<span class="jbadge struct">结构化产出 ✓</span>':'');

    <div class="jmain"><span class="jmark">${mark}</span>${e.text}${badges}<div class="jid">v2:${e.sha}</div></div>
  </div>`;
}

function runCurPhase(g){
  // current phase = first phase that still has a running/queued/warn/risk node; else last
  for(let i=0;i<g.phases.length;i++){
    if(g.nodes.some(n=>n.phase===i&&(n.state==="running"||n.state==="warn"||n.state==="risk"||n.state==="queued"||n.state==="monitor")))return i;
  }
  return g.phases.length-1;
}
function hasRunning(g){return g.nodes.some(n=>n.state==="running"||n.state==="warn"||n.state==="risk"||n.state==="monitor")}

/* build the read-only run graph SVG */
function runGraphSVG(g){
  const W=760, laneH=210, padTop=26;
  const lanes=g.phases.length;
  const H=padTop+lanes*0+ (Math.max(...g.nodes.map(n=>n.y))+90);
  // lane separators (vertical) by phase x-bands -- we instead group by phase via x position; draw lane labels at top
  // compute phase x centers from nodes
  const phaseX={};
  g.phases.forEach((ph,i)=>{const ns=g.nodes.filter(n=>n.phase===i);phaseX[i]=ns.length?ns.reduce((a,n)=>a+n.x,0)/ns.length:80+i*200;});
  // edges
  const nodeById=Object.fromEntries(g.nodes.map(n=>[n.id,n]));
  const NW=128, NH=52;
  const edges=g.edges.map(([a,b,st])=>{
    const na=nodeById[a], nb=nodeById[b];if(!na||!nb)return"";
    const x1=na.x+NW/2, y1=na.y, x2=nb.x-NW/2, y2=nb.y;
    const mx=(x1+x2)/2;
    const d=`M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    let cls="edge";
    if(st==="done")cls="edge done";
    else if(na.state==="running")cls="edge flow";
    else if(st==="queued")cls="edge";
    return `<path class="${cls}" d="${d}" marker-end="url(#arr)"/>`;
  }).join("");
  // lane band backgrounds + labels
  const minX=Math.min(...g.nodes.map(n=>n.x))-NW/2-14;
  const bands=g.phases.map((ph,i)=>{
    const ns=g.nodes.filter(n=>n.phase===i);if(!ns.length)return"";
    const cx=phaseX[i];
    return `<text class="lane-label" x="${cx}" y="16" text-anchor="middle">${ph.toUpperCase()}</text>`;
  }).join("");
  const nodes=g.nodes.map(n=>nodeSVG(n)).join("");
  return `<svg class="runsvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMin meet" role="img" aria-label="运行有向图">
    <defs>
      <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M0,0 L7,3 L0,6 Z" fill="var(--line-2)"/>
      </marker>
    </defs>
    ${bands}
    ${edges}
    ${nodes}
  </svg>`;
}
function nodeSVG(n){
  const NW=128, NH=52;
  const x=n.x-NW/2, y=n.y-NH/2;
  const stateCls={running:"rn-running",done:"rn-done",warn:"rn-warn",risk:"rn-risk",queued:"rn-queued",monitor:"rn-monitor"}[n.state]||"rn-box";
  const stateTxt={running:"跑着",done:"完成",warn:"卡住·待你",risk:"失败",queued:"排队",monitor:"常驻"}[n.state]||"";
  const stateColor={running:"running",done:"done",warn:"warn",risk:"risk",queued:"queued",monitor:"monitor"}[n.state]||"queued";
  const pulse=(n.state==="running"||n.state==="warn"||n.state==="risk")?"rn-pulse":"";
  const sel=runNodeSel===n.id;
  // gate / loop / monitor adornments
  let badge="";
  if(n.kind==="gate"){badge=`<text class="rn-gateicon" x="${n.x}" y="${y-6}" text-anchor="middle" fill="${n.paid?'var(--warn)':'var(--clay-deep)'}">${n.paid?'⊘ 要你批·花钱':'◇ 要你定标准'}</text>`;}
  if(n.kind==="loop"){badge=`<text class="rn-sub" x="${n.x}" y="${y-6}" text-anchor="middle" fill="var(--ink-3)">↻ 自动重跑 · 第 ${n.round||0} 轮</text>`;}
  if(n.kind==="monitor"){badge=`<text class="rn-sub" x="${n.x}" y="${y-6}" text-anchor="middle" fill="var(--slate)">⦿ 后台常开 · 已产出 ${n.feed} · 不进待办</text>`;}
  // hits ledger beside paid gate
  const hits=(n.kind==="gate"&&n.hits)?`<text class="rn-hit" x="${n.x+NW/2+6}" y="${n.y+2}" text-anchor="start">命中已认证模式\n自动通过 ×${n.hits}</text>`:"";
  const hitsTspan=(n.kind==="gate"&&n.hits)?`<text class="rn-hit" x="${n.x+NW/2+8}" y="${n.y-3}" text-anchor="start"><tspan x="${n.x+NW/2+8}">命中已认证模式</tspan><tspan x="${n.x+NW/2+8}" dy="11">自动通过 ×${n.hits}</tspan></text>`:"";
  // self-loop arc for loop node (round>0 shows the execute->verify loop)
  const loopArc=(n.kind==="loop")?`<path class="edge ${n.state==='done'?'done':''}" d="M ${n.x-NW/2-2} ${n.y+NH/2-6} C ${n.x-NW/2-34} ${n.y+34}, ${n.x-6} ${n.y+40}, ${n.x-6} ${n.y+NH/2+2}" marker-end="url(#arr)"/>`:"";
  const livedot=(n.state==="running"||(n.kind==="gate"&&n.state==="warn"))?`<circle class="rn-livedot on" cx="${n.x+NW/2-9}" cy="${y+9}" r="3.5"/>`:"";
  return `<g class="rn-node ${stateCls} ${pulse}" onclick="selRunNode('${n.id}')">
    ${badge}${hitsTspan}${loopArc}
    <rect class="rn-box" x="${x}" y="${y}" width="${NW}" height="${NH}" rx="9" ${sel?'stroke-width="2.6"':''}></rect>
    ${livedot}
    <text class="rn-label" x="${n.x}" y="${n.y-2}" text-anchor="middle">${fitLabel(n.label)}</text>
    <text class="rn-state ${stateColor}" x="${n.x}" y="${n.y+15}" text-anchor="middle">${stateTxt}${n.state==='done'&&n.kind==='loop'?' · 检查通过自停':''}</text>
  </g>`;
}
function fitLabel(s){return s.length>9?s.slice(0,9):s}
function selRunNode(id){runNodeSel=(runNodeSel===id?null:id);renderAside();
  // re-stroke selected without full main rerender (keep animation): just repaint nodes
  const hit=findWf(runWf);if(hit){const sv=document.querySelector(".runcanvas .runsvg");if(sv){sv.outerHTML=runGraphSVG(hit.w.graph);}}
}

        <div class="es">最难的不是看指标,是 <b>找到对的指标</b>。Claude 会引导你:先想清「这个产品成了,什么数会变好」(果),再倒推出能提前预警、你能直接动的先行指标(因),并讲清它俩的因果。</div>
        <div style="margin-top:20px"><button class="btn primary" onclick="startSetup()">和 Claude 一起建立指标 →</button></div>
      </div>`;
    return;
  }
  const ns=p.northStar;
  const tcss=t=>t==='good'?'ok':t==='bad'?'risk':'ink-3';
  const nsSpark=ns&&ns.pts?`<svg width="118" height="34" viewBox="0 0 200 38" preserveAspectRatio="none"><polyline points="${ns.pts}" fill="none" stroke="var(--${tcss(ns.trend)})" stroke-width="2"/></svg>`:'';
  const banner=ns?`<div class="nsbanner">
      <div>
        <span class="nsb-tag">北极星</span>
        <div class="nsb-metric">${ns.metric}</div>
        <div class="nsb-sub">这个产品成了,最该变好的那个数 —— 再用「${ns.backstop}」兜底,防止「这个数涨了、生意却没变好」。</div>
      </div>
      <div class="nsb-stat">
        <div class="nsb-cell"><span class="nl">目标</span><b>${ns.target}</b></div>
        <div class="nsb-cell"><span class="nl">现在</span><b class="trend-${ns.trend}">${ns.current}</b></div>
        ${nsSpark?`<div class="nsb-cell">${nsSpark}<span class="nl">近 6 期趋势</span></div>`:''}
        <span class="nsb-align ${ns.aligned?'ok':'no'}">${ns.aligned?'方向对齐 ✓':'未对齐 !'}</span>
      </div>
    </div>`:'';
  const leadCard=l=>{const good=l[2]!=='bad';
    return `<div class="leadcard">
      <div class="lc-top"><span class="lc-v">${l[1]||'·'}</span><span class="lc-src">${l[5]||''}</span></div>
      <div class="lc-k">${l[0]}<span class="lc-tag ${good?'good':'bad'}">${good?'良好':'需关注'}</span></div>
      <div class="lc-why">${l[3]}</div></div>`;};
  const resultCard=b=>{
    if(b.pending)return `<div class="resultcard pend res-flat"><div class="rc-k">${b.k}${b.target&&b.target!=='—'?`<span class="rc-target">目标 ${b.target}</span>`:''}</div><div class="rc-v">待接入<span class="pendtag">数据源未接</span></div><div class="rc-s">${b.s}</div></div>`;
    const tlabel={good:'↘ 在变好',bad:'↗ 在变差',flat:'— 持平'}[b.trend]||'';
    const spark=b.pts?`<svg width="200" height="36" viewBox="0 0 200 38" preserveAspectRatio="none"><polyline points="${b.pts}" fill="none" stroke="var(--${tcss(b.trend)})" stroke-width="1.6"/></svg>`:'';
    return `<div class="resultcard res-${b.trend==='bad'?'bad':b.trend==='flat'?'flat':'good'}">
      <div class="rc-k">${b.k}${b.target?`<span class="rc-target">目标 ${b.target}</span>`:''}</div>
      <div class="rc-v">${b.v}</div>
      <div class="rc-trend ${b.trend}">${tlabel}</div>
      <div class="rc-s">${b.s}</div>${spark}</div>`;};
  const groups=p.lagging.map((lag,gi)=>{
    const leads=p.leading.filter(l=>l[4]===lag.k);
    const headRow=gi===0?`<div class="cg-colhead"><span>先行 · 因 <span class="sub">快 · 你今天能动</span></span><span>结果 · 果 <span class="sub">慢 · 事后才看得出</span></span></div>`:'';
    const leadsHtml=leads.length?leads.map(leadCard).join(''):`<div class="leadcard" style="border-left-color:var(--line-2);color:var(--ink-3);font-size:12px;padding:12px 14px">（还没接能预测它的先行指标）</div>`;
    const drv=leads[0];
    const strength=drv&&drv[7]==='strong'?'strong':'med';
    const bridge=`<div class="cg-bridge ${strength}"><div class="arrow">→</div><div class="lt">${drv?drv[6]:''}</div><div class="str">${strength==='strong'?'强因果':'中等'}</div></div>`;
    return `<div class="cgroup">${headRow}<div class="cg-leads">${leadsHtml}</div>${bridge}${resultCard(lag)}</div>`;
  }).join("");
  $("main").innerHTML=`
    <div class="prodhead">
      <span class="dot ${p.health}" style="width:11px;height:11px;border-radius:50%"></span>
      <span class="ph-n">${p.name}</span>
      <span class="ph-cap b-${p.health}">${HMAP[p.health]}</span>
      <span class="ph-edit" onclick="startSetup()">重新建立 / 调整</span>
    </div>
    ${banner}
    <div class="readhint">怎么读:<b>盯住左边你今天能动的「因」,右边的「果」才会跟着动。</b> 每组中间的箭头标了从因到果大概要多久、因果有多强。</div>
    ${groups}
    <div class="srcnote">数据来源:结果指标自动汇聚自 <b>埋点/数仓 · CI/eval · git/PR</b>;没接上的诚实标「待接入」,绝不编造数字。</div>`;
}

function renderAsideRun(){
  const hit=findWf(runWf);if(!hit){$("aside").innerHTML="";return}
  const g=hit.w.graph;
  if(!runNodeSel){
    $("aside").innerHTML=`<div class="ax-head">这条运行</div><div class="ax">
      <div class="healthline"><span class="hl-d dot ${hit.w.health}"></span>
        <div><div class="hl-t">${HMAP[hit.w.health]}</div><div class="hl-s">${hit.w.name} · ${hit.w.animate?'实时运行中':'静止 · 全绿'}</div></div></div>
      <div class="lv2" style="padding:6px 2px;font-size:12.5px;color:var(--ink-2)">点中间运行图里任一节点 —— 这里滑出它真调了什么、停在哪、要不要你。只有跑着的节点和活动边在脉动,其余静止。</div>
    </div>`;return;
  }
  const n=g.nodes.find(x=>x.id===runNodeSel);if(!n){runNodeSel=null;return renderAsideRun()}
  const sub={
    done:`这步已完成 · 产出已交给下一步。`,
    running:`这步在自己跑,暂不需要你。`,
    queued:`排队中 · 等上游过了才轮到它。`,
    monitor:`后台常开 · 已产出 ${n.feed} · 不进待办,绝不报红。`,
    warn:n.kind==="gate"?(n.paid?`要你批的花钱关:它要花钱/对外/撤不回,你不批就不动。`:`定标准的关:认一次合格线就行。`):`卡住了 · 在等你处理一下。`,
    risk:`失败 · 合格线没过,自动重跑停下等你。`
  }[n.state]||"";
  const subCls={done:'ok',running:'',queued:'',monitor:'',warn:'warn',risk:'risk'}[n.state]||"";
  const chips=(n.skills||[]).map(s=>`<span class="skillchip ${(s.match(/^(fal-|sora|imagegen|speech)/))?'paid':''}">${s}</span>`).join("");
  const kindLab={agent:"一次 agent 调用",gate:(n.paid?"要你批 · 花钱关(花钱·对外·撤不回)":"定标准关(认一次合格线)"),loop:"自动重跑(不达标就再来一遍)",barrier:"等几路都到齐",monitor:"长期任务 · 后台常开"}[n.kind];
  const bad=n.state==="warn"||n.state==="risk";
  const acts=bad
    ? `<div class="gateacts">
        <button class="btn primary" onclick="toast('已跳到出事的环节 · 可单独查看 / 重跑(占位)')">跳到出事的处</button>
        <button class="btn ghost" onclick="toast('已从这一步发起重跑(占位)· 自动重跑接手')">从这一步重跑</button>
       </div>`
    : (n.state==="monitor"
        ? `<div class="ndsub ok">后台常开 · 已产出 ${n.feed} · 不进待办。没产出不等于挂了,真卡住会单独提醒。</div>`
        : `<div class="ndsub ${n.state==='done'?'ok':''}">这步在自己跑,暂不需要你。</div>`);
  const hitled=(n.kind==="gate"&&n.hits)?`<div class="acc"><div class="acl">这道关 · 自动通过记录</div><div class="acc-c" style="color:var(--clay-deep)">符合已认可规则 · 自动通过 ×${n.hits}<br><span style="color:var(--ink-3)">越攒越省 · 仍每批二次确认花钱动作</span></div></div>`:'';
  $("aside").innerHTML=`<div class="ax-head decide">拍板前先看这些</div><div class="ax dctx nodedetail">
    <div class="dterm">${n.label}</div>
    <div class="ndsub ${subCls}">${sub}</div>
    <div class="axlabel" style="margin-top:0">它真调的 skill 链</div>
    <div class="ndskills">${chips||'<span style="color:var(--ink-3);font-size:12px">无外部 skill</span>'}</div>
    <div style="font-size:12px;color:var(--ink-3);margin-bottom:11px">类型:<b style="color:var(--ink-2)">${kindLab}</b></div>
    <div class="axlabel" style="margin-top:0">prompt 摘要</div>
    <div class="promptbox">${n.prompt||'—'}</div>
    ${hitled}
    <div class="met2"><span><span class="ml">耗时(二级)</span>${n.state==='done'?'0:48':(n.state==='running'?'进行中':(n.state==='queued'?'—':'已停 7 分'))}</span>
      <span><span class="ml">token(二级)</span>${n.state==='done'?'12.4k':(n.state==='queued'?'—':'4.1k')}</span></div>
    ${acts}
  </div>`;
}

  const sharp=p.leading.find(l=>l[0].indexOf("待你批")>=0)||p.leading[0];
  const sk=sharp?sharp[0]:"", sv=sharp?sharp[1]:"", sdrv=sharp?sharp[4]:"", slt=sharp?sharp[6]:"";
  const advice = sk.indexOf("待你批")>=0
    ? `<b>${sk}</b> 现在 <b>${sv}</b> —— 这是今天你最快能动的一条。把待你批的清掉,大约 ${slt}后「${sdrv}」就会跟着变好。`
    : `<b>${sk}</b> 现在 <b>${sv}</b> —— 今天最该盯、也最动得了的一条,大约 ${slt}后驱动「${sdrv}」。`;
  $("aside").innerHTML=`<div class="ax-head">今天先动哪一项</div><div class="ax">
    <div class="healthline"><span class="hl-d dot ${p.health}"></span>
      <div><div class="hl-t">${HMAP[p.health]}</div><div class="hl-s">${p.name} · 北极星 ${p.northStar?p.northStar.metric:p.ns}</div></div></div>
    <div class="leverbox" style="border-left:3px solid var(--clay)">
      <div class="lv1"><span class="k">最该动的一条</span></div>
      <div class="lv2" style="margin-top:6px;color:var(--ink-2);font-size:12.5px;line-height:1.5">${advice}</div>
    </div>
    <button class="btn primary" style="width:100%;margin-top:4px" onclick="go('inbox')">去待你处理 · 清掉待批 →</button>

    <div class="lv2" style="padding:10px 2px 0;font-size:11.5px">这里只挑当下最该动的一条,不重复列全部指标 —— 完整的因→果在左边主区。</div>
  </div>`;
}

function renderAsideDecision(){
  const c=(INBOX[curProd]||[]).find(x=>x.id===sel);if(!c)return renderAsideLevers();
  let body="";
  if(c.type==="side"){body=gateSide(c)}
  else if(c.type==="cert"){body=gateCert(c)}
  else if(c.type==="fail"){body=gateFail(c)}
  else if(c.type==="stuck"){body=gateStuck(c)}
  else if(c.type==="sys"){body=gateSys(c)}
  $("aside").innerHTML=`<div class="ax-head decide">拍板前先看这些</div><div class="ax dctx">${body}</div>`;
}
function gateSide(c){
  const high=c.risk==="high";
  const enabled=high?(diffOpen&&reasonText.trim().length>0):true;
  return `<div class="dterm">${c.t}</div>
    <div class="dwhat warn"><b>将干什么</b><br>${c.what||c.why}</div>
    ${c.diff?`<div class="difftoggle" onclick="diffOpen=!diffOpen;render()">${diffOpen?'▾':'▸'} 展开明细${high?'（高危:不看不让批）':''}</div>
    <div class="difbody ${diffOpen?'open':''}">${c.diff.replace(/\n/g,'<br>')}</div>`:''}
    ${high?`<textarea class="reason" placeholder="通过理由(必填,防你随手批过)" oninput="reasonText=this.value">${reasonText}</textarea>`:''}
    <div class="gateacts">
      <button class="btn primary" ${enabled?'':'disabled'} onclick="approveSide('once')">批这一次</button>
      <button class="btn dark" ${enabled?'':'disabled'} onclick="approveSide('class')">批这一类（写进自动通过的规则）</button>
    </div>
    <div class="gatenote">${high?'摩擦与风险成正比:高危必须先展开明细 + 填理由才解锁。':'低危:可一键通过,或批这一类攒成规则。'}花钱 / 不可逆即便命中规则仍每批二次确认。</div>
    ${c.wf?`<div style="margin-top:11px"><button class="btn ghost sm" style="width:100%" onclick="openRun('${c.wf}')">▷ 在「运行」面看这条停在哪 →</button></div>`:''}
    <div class="killrow"><button class="btn kill" style="width:100%" onclick="killWf('${c.t}')">⛔ 急停整条流水线</button></div>`;
}
function gateCert(c){
  return `<div class="dterm">${c.t}</div>
    <div class="acc"><div class="acl">合格线(认了就是标准)</div><div class="acc-c">${(c.acceptance||c.why).replace(/\n/g,'<br>')}</div></div>
    ${c.pit?`<div class="pitbox"><b>它主动唱反调</b><br>${c.pit}</div>`:''}
    <div style="font-size:12.5px;color:var(--ink-2);margin-bottom:12px">你只判一件事:这条合格线够不够 <b>充分 + 客观 + 抗偏差</b>。认了,它成为一类可自动通过的规则。</div>
    <div class="gateacts">
      <button class="btn primary" onclick="doCertify()">认可为可复用合格线</button>
      <div class="row"><button class="btn ghost" onclick="toast('已退回 · 让它重拟合格线')">退回重拟</button><button class="btn ghost" onclick="sel=null;render()">稍后</button></div>
    </div>
    ${c.wf?`<div style="margin-top:11px"><button class="btn ghost sm" style="width:100%" onclick="openRun('${c.wf}')">▷ 在「运行」面看这条 →</button></div>`:''}`;
}
function gateFail(c){
  return `<div class="dterm">${c.t}</div>
    <div class="dwhat warn"><b>根因(已聚合)</b><br>${c.cause||c.why}</div>
    <div style="font-size:12.5px;color:var(--ink-2);margin-bottom:12px">说一句改法,自动重跑改完再来;或进运行图看出事的代表。</div>

}
function gateStuck(c){
  return `<div class="dterm">${c.t}</div>
    <div class="dwhat warn"><b>它为什么停</b><br>${c.cause||c.why}</div>
    <div class="gateacts"><button class="btn primary" onclick="processCard('${c.id}','已处理 · 流水线自动续跑')">处理并续跑</button>
      <button class="btn ghost" onclick="sel=null;render()">稍后</button></div>`;
}
function gateSys(c){
  return `<div class="dterm">${c.t} · 空 ≠ 死</div>
    <div class="dwhat"><b>异常</b><br>${c.cause||c.why}</div>
    <div style="font-size:12.5px;color:var(--ink-2);margin-bottom:12px">一切正常时它对你隐身,所以这种突然安静必须单独提醒,否则『坏了』和『没事』长一样。</div>

  if(projStage===1){

    tail.innerHTML=`<div class="runrow low"><div class="rr-t"><b>痛点抓对了</b> · 下一步看看这条赛道上对手在做什么</div><button class="btn ok" onclick="projNext()">看竞品 →</button></div>`;
  }else if(projStage===2){
    const cl=d.competitors.map(c=>`<div class="agli"><span><b>${c[0]}</b></span><span style="color:var(--ink-3);text-align:right;max-width:58%">${c[1]}</span></div>`).join("");
    bub+=`<div class="bub c"><div class="who">CLAUDE · 竞品分析</div>我扫了一圈这条赛道,最该盯的两个:<div style="border:1px solid var(--line);border-radius:9px;margin-top:8px;padding:2px 12px;background:var(--surface)">${cl}</div><br>结论:他们都没把这件事做顺,有空位。我建议<b>建一个一直盯着他们的监控</b>,有实质动作第一时间提醒你 —— 是持续的,不是一次性报告。</div>`;
    tail.innerHTML=`<div class="runrow low"><div class="rr-t">这两个加入<b>竞品监控</b>(后台常开,有动作才出声)</div><button class="btn ok" onclick="projNext()">盯住它们 → 定北极星</button></div>`;
  }else if(projStage===3){
    bub+=`<div class="bub c"><div class="who">CLAUDE · 北极星</div>这个产品<b>成了</b>,最该变好的那个数,我建议是:<br><b style="font-size:15px">${d.ns.metric}</b>(目标 ${d.ns.target})<br>${d.ns.sub}<br><br>它是<b>结果指标(果 · 慢)</b>,我再用「<b>${d.ns.backstop}</b>」兜底,防止『这数涨了、生意却没变好』。北极星定不准,后面全白搭 —— 这条你拍板。</div>`;
    tail.innerHTML=`<div class="runrow" style="background:var(--clay-soft);border:1px solid var(--clay)"><div class="rr-t" style="color:var(--clay-deep)">就用 <b>${d.ns.metric}</b> 当北极星</div><button class="btn primary" onclick="projNext()">定它 → 出原型</button></div>`;
  }else if(projStage===4){
    bub+=`<div class="bub c"><div class="who">CLAUDE · 原型设计</div>北极星定了,先做出来看比空想强。我起草的第一版原型方向:<br><b>${d.prototype}</b><br><br>这会落成一条<b>「做第一版原型」流水线</b>,复用你已有的 skill,跑到评审那步停下等你看。</div>`;
    tail.innerHTML=`<div class="runrow low"><div class="rr-t">出这版原型(建一条原型流水线)</div><button class="btn ok" onclick="projNext()">出原型 → 倒推指标</button></div>`;
  }else if(projStage===5){
    const ll=d.leading.map(l=>`<div class="agli"><span><b>${l[0]}</b></span><span style="color:var(--ink-3);text-align:right;max-width:62%">${l[3]}</span></div>`).join("");
    bub+=`<div class="bub c"><div class="who">CLAUDE · 先行指标</div>北极星(${d.ns.metric})慢、当下还改不动 —— 等它掉了已经晚了。每天真正要盯的,是能<b>提前预警、你能直接动</b>的<b>先行指标(因)</b>。我倒推出三个和北极星有<b>真实因果</b>的:<div style="border:1px solid var(--line);border-radius:9px;margin-top:8px;padding:2px 12px;background:var(--surface)">${ll}</div><br>它们现在都<b>还没数</b> —— 上线前先把口子埋好,接上数据源就自动开始回收(不事后补)。</div>`;
    tail.innerHTML=`<div class="runrow low"><div class="rr-t"><b>就这套</b> · 先行(因)→ 驱动 → 北极星(果)</div><button class="btn ok" onclick="projNext()">建立这套 → 上线</button></div>`;
  }else if(projStage===6){
    bub+=`<div class="bub c"><div class="who">CLAUDE · 上线前确认</div>这个项目的骨架搭好了。点上线,我会:<br>① 在「项目」面把 <b>因 → 驱动 → 果</b> 立起来(指标已内建,接数据源就回收);<br>② 起跑两条流水线:<b>竞品监控</b>(后台常开)+ <b>做第一版原型</b>(跑到评审停下等你);<br>③ 一切正常时它对你隐身,有要你拍板的才浮到「待办」。</div>`;
    tail.innerHTML=`<div class="runrow" style="background:var(--ok-soft);border:1px solid var(--ok)"><div class="rr-t" style="color:var(--ok)"><b>${d.name}</b> · 起名→洞察→竞品→北极星→原型→指标,齐了</div><button class="btn ok" onclick="finishProject()">创建项目并上线 →</button></div>`;
  }
  b.innerHTML=bub;
}
function renderAsideProject(){
  const d=projData;
  if(!d){$("aside").innerHTML=`<div class="ax-head create">正在搭起这个项目</div><div class="ax"><div style="color:var(--ink-3);font-size:13px;padding:20px 4px;text-align:center">先给项目起个名,这里会一步步把它该盯的几件事搭出来。</div></div>`;return}
  const items=[
    ["项目 · 是什么",d.name,0],
    ["洞察 · 为谁解决什么",d.user,1],
    ["竞品基线",d.competitors.length+" 个在盯",2],
    ["北极星(果)",d.ns.metric,3],
    ["第一版原型",projStage>4?"已起草":"待出",4],
    ["先行指标(因)",projStage>5?(d.leading.length+" 项 · 已内建"):"待倒推",5]
  ];
  const rows=items.map(([k,v,st])=>{
    const state=projStage>st?'s-done':(projStage===st?'s-active':'s-pending');
    const mark=projStage>st?'✓':(projStage===st?'•':'·');
    return `<div class="cprow"><div class="ic ${state}">${mark}</div>
      <div><div class="nm">${k}</div><div class="ds">${projStage>=st?v:'待定'}</div></div></div>`;
  }).join("");
  $("aside").innerHTML=`<div class="ax-head create">正在搭起这个项目</div><div class="ax">
    <div class="lv2" style="margin:0 2px 12px;font-size:12px">从起名到指标,逐步往下。Claude 边问边把这个项目<b>该盯的几件事</b>定下来 —— 最后落成项目面的 因 → 果。</div>
    ${rows}</div>`;
}
function finishProject(){
  const d=projData, id="p"+(PRODUCTS.length+1);
  PRODUCTS.push({id,name:d.name,health:"green",agents:2,set:true,ns:d.ns.metric,
    northStar:{metric:d.ns.metric,target:d.ns.target,current:"待接入",trend:"flat",aligned:true,backstop:d.ns.backstop,pts:""},
    leading:d.leading,
    lagging:[
      {k:d.ns.metric,v:"待接入",s:"北极星 · 上线接数据源后回收",target:d.ns.target,trend:"flat",pending:true},
      {k:d.ns.backstop,v:"待接入",s:"兜底结果指标",target:"—",trend:"flat",pending:true}]});
  INBOX[id]=[]; AUTOCLOSED[id]=[];
  FLEET[id]={exec:[
    {id:id+"-proto",name:"做第一版原型",health:"green",ns:"按设计契约出原型 · 待评审",skills:["reference-design-contract","design-taste-frontend","design-review"],agg:[1,0,0],
      graph:{phases:["规划","执行","验收"],nodes:[
        {id:"q1",label:"定设计契约",phase:0,state:"done",kind:"agent",skills:["reference-design-contract"],x:90,y:110,prompt:"按洞察 + 北极星,定原型的设计约束契约"},
        {id:"q2",label:"出原型",phase:1,state:"running",kind:"agent",skills:["design-taste-frontend"],x:280,y:110,prompt:"按契约做第一版可点原型"},
        {id:"q3",label:"过评审(验收)",phase:2,state:"queued",kind:"loop",skills:["design-review"],x:470,y:110,round:0,prompt:"design-review 打分,<8 打回重做"}
      ],edges:[["q1","q2","done"],["q2","q3","queued"]]}}
  ],mon:[
    {id:id+"-watch",name:"竞品监控",health:"green",ns:"一直盯着 · 刚上线产出 0",skills:["agent-browser","competitive-ads-extractor","social-x-post-card"],feed:"产出 0",
      graph:{phases:["执行","监控"],nodes:[
        {id:"w1",label:"一直盯竞品",phase:0,state:"monitor",kind:"monitor",skills:["agent-browser"],x:120,y:110,feed:0,prompt:"后台盯住 "+d.competitors.map(c=>c[0]).join(" / ")},
        {id:"w2",label:"出对标卡",phase:1,state:"queued",kind:"agent",skills:["competitive-ads-extractor","social-x-post-card"],x:360,y:110,prompt:"对手有实质动作时,出对标卡"}
      ],edges:[["w1","w2","queued"]]}}
  ]};
  curProd=id; mode="normal"; view="board"; projData=null;
  toast("✓ 已创建 <b>"+PRODUCTS[PRODUCTS.length-1].name+"</b> · 指标已内建(上线前就埋好)· 竞品监控 + 原型 两条流水线已起跑");
  render(); fadeMain();
}

/* ============ gate actions ============ */
function processCard(id,msg){
  INBOX[curProd]=(INBOX[curProd]||[]).filter(c=>c.id!==id);sel=null;
  if(needCount(curProd)===0){const p=prod();if(p)p.health="green"}
  if(msg)toast(msg);render();
}
function approveSide(kind){
  const id=sel;
  if(kind==="class"){bumpFlywheel();processCard(id,"✓ 已批准并写进自动通过的规则 · 同类以后自动通过(花钱/对外仍每批二次确认)")}
  else{processCard(id,"✓ 已批准这一次 · 执行中")}
}
function doCertify(){const id=sel;bumpFlywheel();processCard(id,"✓ 已认可 · 已加入自动通过的规则 · 同类以后自动通过,不再逐条问你")}
function killWf(name){processCard(sel,"⛔ 已急停 "+name+" · 所有AI 实例已冻结")}
function bumpFlywheel(){
  FW_AUTOPASS+=1;FW_HOURS=Math.round((FW_HOURS+0.1)*10)/10;
  const big=$("fwBig");if(big)countUp(big,FW_AUTOPASS-1,FW_AUTOPASS);
  const hr=$("fwHours");if(hr)hr.textContent=FW_HOURS;
}
function countUp(el,from,to){let s=null;const dur=600;function step(t){if(!s)s=t;const p=Math.min((t-s)/dur,1);el.textContent=Math.round(from+(to-from)*p);if(p<1)requestAnimationFrame(step)}requestAnimationFrame(step)}

/* ============ render ============ */
function render(){
  renderRail();renderMain();renderAside();
  [...document.querySelectorAll("#segnav button")].forEach(b=>b.classList.toggle("on",b.dataset.v===view&&mode==="normal"));
}
/* ============ 自动演示 ============ */
let demoRunning=false;
function runDemo(){
  if(demoRunning)return; demoRunning=true;
  const btn=$("demoBtn"); if(btn)btn.textContent="演示中…";
  let nar=$("narrator");
  if(!nar){nar=document.createElement("div");nar.id="narrator";nar.className="narrator";document.body.appendChild(nar)}
  nar.classList.add("show");
  const steps=[
    ["演示 · 客户交付产品的下午。待你处理只浮出需要你的事,其余在自己跑。",()=>{selProd("delivery");go("inbox")},2600],
    ["① 要你批的花钱关 —— 选中「海报工厂」卡(将调 imagegen+fal 付费),右栏原地处理。",()=>{selCard("poster")},2900],
    ["进「运行」面看它实时跑:运行图动起来,那道花钱关正停着等你批。",()=>{openRun("wf-poster")},3600],
    ["回待你处理,把它批掉 —— 高危(花钱·不可逆):不展开明细、不填理由,『批准』锁死。",()=>{go("inbox");selCard("poster");diffOpen=true;render()},3000],
    ["展开明细 + 填通过理由 → 解锁。",()=>{reasonText="本周客户海报排期已确认,预算在控";render()},2600],
    ["点『批这一类』→ 写进自动通过的规则。一次判断越用越值,省了多少看得见。",()=>{approveSide("class")},2900],
    ["② 落地页那条:刚真跑完、9.2 过评审 —— 选「落地页」定标准卡。",()=>{selCard("cert")},2900],
    ["认一次『≥8 且二次无新问题』为合格线 → 同类落地页以后自动通过。",()=>{doCertify()},3000],
    ["③ 创建的灵魂 · 低风险一句话就跑。",()=>{startCreate("low")},2600],
    ["只读 / 可逆 / 不花钱 → 零定标准,和手写自动重跑一样爽。",()=>{runLow()},3200],
    ["④ 高风险才停下来定标准 + dry-run。",()=>{startCreate("high")},2600],
    ["危险动作标红 + Claude 主动唱反调 → 强制先定标准。",()=>{certHigh()},2800],
    ["dry-run 看清再开跑、接自动通过的规则(花钱仍每批二次确认)。",()=>{runHigh()},3000],
    ["⑤ 看『自动通过的规则』:大数字累计,越攒越省。",()=>{go("flywheel")},3000],
    ["⑥ 项目管理 = 引导建立指标。选『增长 · 洞察』(未建立),和 Claude 一起建。",()=>{selProd("growth");startSetup()},2800],
    ["先定最终目标(果):新用户首周留存。",()=>{pickNS("新用户首周留存")},2800],
    ["再倒推出能预测它、你能拨的先行指标(因)。",()=>{setupStage=2;render()},3000],
    ["建立 → 先行(因)→ 驱动 → 结果(果),并以左因→中桥→右果呈现。这就是 PM 的全部。",()=>{finishSetup()},3400],
    ["演示完毕。刷新页面可重置,自己再走一遍。",()=>{selProd("delivery");go("inbox")},2400],
  ];
  let i=0;
  (function tick(){
    if(i>=steps.length){nar.classList.remove("show");demoRunning=false;if(btn)btn.textContent="▶ 看演示";return}
    const [cap,fn,wait]=steps[i++];
    nar.innerHTML=`<span class="ns">${i}/${steps.length}</span>${cap}`;
    try{fn()}catch(e){}
    setTimeout(tick,wait);
  })();
}

$("segnav").addEventListener("click",e=>{if(e.target.dataset.v)go(e.target.dataset.v)});
/* 「按异常管理」开关已移除 —— 绿色隐身由 rail 的 红→黄→绿 排序 + 空态承载,不另起全局模式 */
document.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();openPalette()}if(e.key==="Escape")closePalette()});
render();
</script>
