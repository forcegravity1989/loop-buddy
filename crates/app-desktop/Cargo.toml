[package]
name = "app-desktop"
description = "Desktop shell (Dioxus 0.7 / wry WebView). P0: the throwaway 'hello signals' ramp; P2 onward: the real shell."
edition.workspace = true
version.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "builders-workbench"
path = "src/main.rs"

[dependencies]
# Hard-pinned via the workspace (=0.7.9). `desktop` feature = wry WebView shell.
dioxus = { workspace = true, features = ["desktop"] }
bw-core = { workspace = true }
ui = { workspace = true }
